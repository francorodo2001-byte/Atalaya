<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKT · Panel de Agencia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── DESIGN SYSTEM ──────────────────────────────────────── */
  :root {
    --bg:          #0c0b1a;
    --surface:     #141330;
    --surface-2:   #1c1b3a;
    --surface-3:   #232145;
    --border:      rgba(255,255,255,0.06);
    --border-2:    rgba(255,255,255,0.10);
    --text:        #e4e2f5;
    --text-2:      #8a87b0;
    --text-3:      #504e70;
    --accent:      #f5b731;
    --accent-dim:  rgba(245,183,49,0.12);
    --accent-glow: rgba(245,183,49,0.25);
    --good:        #52e8b0;
    --good-dim:    rgba(82,232,176,0.12);
    --warn:        #f5b731;
    --bad:         #ff4d6d;
    --bad-dim:     rgba(255,77,109,0.12);
    --info:        #60a5fa;
    --shadow:      0 8px 40px rgba(0,0,0,0.55);
    --shadow-sm:   0 2px 14px rgba(0,0,0,0.4);
    --r:    16px;
    --r-sm: 10px;
    --r-xs: 6px;
    --sidebar-w: 252px;
    --top-h: 0px;
  }
  [data-theme="light"] {
    --bg:          #f0effa;
    --surface:     #ffffff;
    --surface-2:   #e8e6f5;
    --surface-3:   #dddaf0;
    --border:      rgba(0,0,0,0.07);
    --border-2:    rgba(0,0,0,0.12);
    --text:        #1a1828;
    --text-2:      #5a5778;
    --text-3:      #9a97b8;
    --accent:      #c48f0c;
    --accent-dim:  rgba(196,143,12,0.10);
    --accent-glow: rgba(196,143,12,0.20);
    --good:        #0ea470;
    --good-dim:    rgba(14,164,112,0.10);
    --warn:        #c48f0c;
    --bad:         #e02448;
    --bad-dim:     rgba(224,36,72,0.10);
    --info:        #2563eb;
    --shadow:      0 8px 40px rgba(26,24,40,0.10);
    --shadow-sm:   0 2px 14px rgba(26,24,40,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased; font-size: 14px;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* ── LAYOUT ─────────────────────────────────────────────── */
  .layout { display: flex; height: 100vh; }

  /* ── SIDEBAR ────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: background 0.25s, border-color 0.25s;
    z-index: 10; overflow: hidden;
  }

  /* Logo */
  .sidebar-logo {
    display: flex; align-items: center; gap: 14px;
    padding: 26px 20px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo-beacon {
    width: 42px; height: 42px; flex-shrink: 0;
    background: var(--accent);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #0c0b1a;
    box-shadow: 0 0 0 1px rgba(245,183,49,0.3), 0 4px 20px var(--accent-glow);
    letter-spacing: -1px; line-height: 1;
    transition: background 0.25s, box-shadow 0.25s;
  }
  .logo-copy { min-width: 0; }
  .logo-name {
    font-size: 16px; font-weight: 700; color: var(--text);
    letter-spacing: -0.03em; line-height: 1.1;
  }
  .logo-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; font-weight: 400; }

  /* Nav */
  .sidebar-nav { padding: 18px 12px; flex: 1; overflow-y: auto; }
  .nav-section { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); padding: 0 10px; margin-bottom: 8px; }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px 11px 14px; border-radius: var(--r-sm);
    cursor: pointer; transition: all 0.15s;
    border: none; background: transparent;
    color: var(--text-2); font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500; width: 100%;
    text-align: left; margin-bottom: 2px;
    position: relative; overflow: hidden;
  }
  .nav-item::after {
    content: '';
    position: absolute; left: 0; top: 50%; transform: translateY(-50%) scaleY(0);
    width: 3px; height: 22px; background: var(--accent);
    border-radius: 0 3px 3px 0;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active {
    background: var(--accent-dim); color: var(--text);
    font-weight: 600;
  }
  .nav-item.active::after { transform: translateY(-50%) scaleY(1); }

  .nav-icon-wrap {
    width: 32px; height: 32px; border-radius: var(--r-xs);
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    transition: background 0.15s;
  }
  .nav-item.active .nav-icon-wrap { background: var(--accent-dim); }

  /* Footer */
  .sidebar-footer { padding: 14px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }

  .theme-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--r-sm);
    cursor: pointer; transition: all 0.15s;
    border: 1px solid var(--border-2);
    background: var(--surface-2); color: var(--text-2);
    font-family: 'Inter', sans-serif; font-size: 13px;
    font-weight: 500; width: 100%; text-align: left;
  }
  .theme-btn:hover { color: var(--text); border-color: var(--text-3); background: var(--surface-3); }
  .theme-icon { font-size: 15px; }

  /* ── MAIN CONTENT ────────────────────────────────────────── */
  .main { flex: 1; overflow: hidden; background: var(--bg); transition: background 0.25s; }
  .main iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ── MOBILE ──────────────────────────────────────────────── */
  @media (max-width: 680px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%; height: auto; flex-direction: row;
      border-right: none; border-bottom: 1px solid var(--border);
      align-items: stretch;
    }
    .sidebar-logo {
      padding: 10px 14px; border-bottom: none;
      border-right: 1px solid var(--border);
    }
    .logo-copy { display: none; }
    .sidebar-nav {
      padding: 8px; display: flex; gap: 4px;
      flex: 1; overflow-x: auto; overflow-y: hidden;
      align-items: center;
    }
    .nav-section { display: none; }
    .nav-item { margin-bottom: 0; padding: 8px 14px; white-space: nowrap; flex-shrink: 0; }
    .nav-item::after { display: none; }
    .sidebar-footer { padding: 8px; border-top: none; border-left: 1px solid var(--border); display: flex; align-items: center; }
    .theme-btn { padding: 8px 10px; }
    .theme-label { display: none; }
  }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-beacon">M</div>
      <div class="logo-copy">
        <div class="logo-name">MKT</div>
        <div class="logo-desc">Panel de Agencia</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-section">Herramientas</p>
      <button class="nav-item active" id="tabAds">
        <span class="nav-icon-wrap">📊</span>
        Ads Dashboard
      </button>
      <button class="nav-item" id="tabCrm">
        <span class="nav-icon-wrap">🗂</span>
        CRM
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="theme-btn" id="themeToggle">
        <span class="theme-icon" id="themeIcon">🌙</span>
        <span class="theme-label" id="themeLabel">Modo oscuro</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <iframe id="mainFrame" src="/ads" title="Panel MKT"></iframe>
  </main>

</div>
<script>
  let current = 'ads';

  const saved = localStorage.getItem('mkt-theme') || 'dark';
  applyTheme(saved);

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const isDark = t === 'dark';
    document.getElementById('themeIcon').textContent  = isDark ? '🌙' : '☀️';
    document.getElementById('themeLabel').textContent = isDark ? 'Modo oscuro' : 'Modo claro';
  }

  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('mkt-theme', next);
    try { document.getElementById('mainFrame').contentWindow.postMessage({ type:'theme', value:next }, '*'); } catch(_){}
  });

  function switchTab(tab) {
    if (tab === current) return;
    current = tab;
    document.getElementById('tabAds').classList.toggle('active', tab === 'ads');
    document.getElementById('tabCrm').classList.toggle('active', tab === 'crm');
    document.getElementById('mainFrame').src = tab === 'ads' ? '/ads' : '/crm';
  }

  document.getElementById('tabAds').addEventListener('click', () => switchTab('ads'));
  document.getElementById('tabCrm').addEventListener('click', () => switchTab('crm'));
</script>
</body>
</html>
